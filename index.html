<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Defect Scan</title>
<link rel="manifest" href="manifest.json">

<!-- ======================================================
  Config — edit only this block
  ====================================================== -->
<script>
  const CONFIG = {
    version: 'v1.4',
    modelUrl: './defect.onnx',              // ONNX model path
    modelDataUrl: './defect.onnx.data',     // external weights (must be served alongside)
    labels: ['algae', 'major_crack', 'minor_crack', 'peeling', 'plain', 'spalling', 'stain'],
    inputSize: 512,                         // must match training input size
    mean: [0.485, 0.456, 0.406],
    std:  [0.229, 0.224, 0.225],
    confidenceThreshold: 0.5,
    normalClassIndex: 4,                    // plain = 4
    severeClasses: [1, 5],                  // major_crack, spalling
    demoMode: false,                        // set true to use random outputs instead of the model
  }
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --text: #e8e8e0;
    --muted: #555550;
    --accent: #ff6b35;
    --green: #39d353;
    --amber: #f0a500;
    --red: #ff4444;
    --blue: #4488ff;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    user-select: none;
  }

  /* ── Camera layer ─────────────────────────────────── */
  #camera-wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── Scan overlay (corner brackets) ─────────────────── */
  #scan-frame {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(70vw, 280px);
    height: min(70vw, 280px);
    pointer-events: none;
    transition: border-color .3s;
  }
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.8;
    transition: opacity .3s, border-color .3s;
  }
  .corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  /* Scan line animation */
  #scan-line {
    position: absolute;
    left: 4px; right: 4px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2s ease-in-out infinite;
    opacity: 0.6;
  }
  @keyframes scan {
    0% { top: 4px; }
    100% { top: calc(100% - 4px); }
  }

  /* ── Grad-CAM canvas ─────────────────────────────────── */
  #gradcam-canvas {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(70vw, 280px);
    height: min(70vw, 280px);
    opacity: 0;
    border-radius: 2px;
    pointer-events: none;
    transition: opacity .4s;
  }
  #gradcam-canvas.visible { opacity: 0.65; }

  /* ── Top bar ─────────────────────────────────── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    background: linear-gradient(180deg, rgba(0,0,0,.7) 0%, transparent 100%);
  }
  #logo {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .15em;
    color: var(--accent);
    text-transform: uppercase;
  }
  #fps-counter {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .08em;
  }

  /* ── Result card (bottom) ─────────────────────────────────── */
  #result-card {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 20px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
    background: linear-gradient(0deg, rgba(0,0,0,.85) 0%, rgba(0,0,0,.6) 70%, transparent 100%);
    }

  #label-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  #class-label {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 400;
    letter-spacing: .05em;
    color: var(--text);
    transition: color .2s;
  }
  #conf-badge {
    font-family: var(--mono);
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid var(--accent);
    color: var(--accent);
    letter-spacing: .08em;
    transition: border-color .2s, color .2s;
  }

  /* Confidence bar */
  #conf-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  #conf-fill {
    height: 100%;
    border-radius: 1px;
    background: var(--accent);
    width: 0%;
    transition: width .15s ease-out, background .2s;
  }

  /* All-class bars */
  #class-bars {
    display: grid;
    gap: 8px;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bar-name {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .08em;
    color: var(--muted);
    width: 76px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--muted);
    width: 0%;
    transition: width .15s ease-out, background .2s;
  }
  .bar-fill.top { background: var(--accent); }
  .bar-val {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    width: 32px;
    text-align: right;
  }

  /* ── Action buttons ─────────────────────────────────── */
  #actions {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .action-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(10,10,10,.7);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: border-color .2s, color .2s, background .2s;
    backdrop-filter: blur(8px);
  }
  .action-btn:active { transform: scale(.93); }
  .action-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,107,53,.1);
  }

  /* ── Loading screen ─────────────────────────────────── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    transition: opacity .5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading-logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .3em;
    color: var(--accent);
    text-transform: uppercase;
  }
  #loading-status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: .08em;
  }
  #loading-bar-track {
    width: 160px;
    height: 1px;
    background: var(--border);
  }
  #loading-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .3s ease-out;
  }

  /* ── Status states (color themes) ─────────────────────── */
  body.state-normal  #class-label { color: var(--green); }
  body.state-defect  #class-label { color: var(--red); }
  body.state-warn    #class-label { color: var(--amber); }
  body.state-normal  #conf-badge  { border-color: var(--green); color: var(--green); }
  body.state-defect  #conf-badge  { border-color: var(--red); color: var(--red); }
  body.state-warn    #conf-badge  { border-color: var(--amber); color: var(--amber); }
  body.state-normal  #conf-fill   { background: var(--green); }
  body.state-defect  #conf-fill   { background: var(--red); }
  body.state-warn    #conf-fill   { background: var(--amber); }
  body.state-normal  .corner { border-color: var(--green); }
  body.state-defect  .corner { border-color: var(--red); }
  body.state-warn    .corner { border-color: var(--amber); }
  body.state-normal  .bar-fill.top { background: var(--green) !important; }
  body.state-defect  .bar-fill.top { background: var(--red) !important; }
  body.state-warn    .bar-fill.top { background: var(--amber) !important; }
</style>
</head>
<body>

<!-- Camera -->
<div id="camera-wrap">

<div id="scan-frame">

<!-- Side buttons -->
<div id="actions">
  <button class="action-btn" id="btn-gradcam" title="Grad-CAM heatmap" onclick="toggleGradcam()">

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="testImage(this)">

<!-- Test result overlay -->
<div id="test-overlay" style="

">

  "/>

  </div>
  <div id="conf-track"><div id="conf-fill"></div></div>

</div>

<!-- ONNX Runtime Web -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.25.1/dist/ort.min.js"></script>

<script>
// ─────────────────────────────────────────────────────────────
//  ORT config
// ─────────────────────────────────────────────────────────────
ort.env.wasm.numThreads = 1

// ─────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────
let session = null
let isRunning = false
let isPaused = false
let showGradcam = false
let facingMode = 'environment'
let stream = null
let lastFpsTime = performance.now()
let frameCount = 0
let lastTopIdx = -1
let testObjectURL = null
let smoothedProbs = null          // EMA smoothed probabilities
const EMA_ALPHA = 0.25            // lower = smoother but slower to react

// offscreen canvases for two-step preprocessing (resize then crop, matching PIL)
// colorSpace:'srgb' forces sRGB on iOS Safari (avoids Display P3 value drift)
const offscreen = document.createElement('canvas')
offscreen.width  = CONFIG.inputSize
offscreen.height = CONFIG.inputSize
const offCtx = offscreen.getContext('2d', { colorSpace: 'srgb', willReadFrequently: true })
const resizeCanvas = document.createElement('canvas')  // intermediate resize canvas
const resizeCtx = resizeCanvas.getContext('2d', { colorSpace: 'srgb' })

const video = document.getElementById('video')
const gradcamCanvas = document.getElementById('gradcam-canvas')
const gradcamCtx = gradcamCanvas.getContext('2d')

// ─────────────────────────────────────────────────────────────
//  Loading helpers
// ─────────────────────────────────────────────────────────────
function setLoadingStatus(msg, pct) {
  document.getElementById('loading-status').textContent = msg
  if (pct != null) document.getElementById('loading-bar-fill').style.width = pct + '%'
}

function hideLoading() {
  const el = document.getElementById('loading')
  el.classList.add('hidden')
  setTimeout(() => el.remove(), 600)
}

// ─────────────────────────────────────────────────────────────
//  Init class bars
// ─────────────────────────────────────────────────────────────
function initBars() {
  const container = document.getElementById('class-bars')
  container.innerHTML = CONFIG.labels.map((label, i) => `
    <div class="bar-row">
      <div class="bar-name">${CONFIG.labels[i]}</div>
      <div class="bar-track"><div class="bar-fill" id="bar-${i}"></div></div>
      <div class="bar-val" id="barval-${i}">0%</div>
    </div>
  `).join('')
}

// ─────────────────────────────────────────────────────────────
//  Model loading
// ─────────────────────────────────────────────────────────────
async function loadModel() {
  if (CONFIG.demoMode) {
    console.warn('demo mode: returning random inference results')
    return null
  }
  try {
    setLoadingStatus('Loading model...', 30)
    const sess = await ort.InferenceSession.create(CONFIG.modelUrl, {
      executionProviders: ['wasm'],           // WASM is more consistent than WebGL on mobile
      externalData: [
        { path: 'defect.onnx.data', data: CONFIG.modelDataUrl }
      ],
    })
    setLoadingStatus('Warming up...', 70)
    // warm-up run to eliminate first-frame latency spike
    const dummyData = new Float32Array(1 * 3 * CONFIG.inputSize * CONFIG.inputSize)
    const dummyTensor = new ort.Tensor('float32', dummyData,
      [1, 3, CONFIG.inputSize, CONFIG.inputSize])
    await sess.run({ input: dummyTensor })
    return sess
  } catch (e) {
    console.error('model load failed:', e)
    setLoadingStatus('Model load failed — switching to demo mode', 100)
    CONFIG.demoMode = true
    return null
  }
}

// ─────────────────────────────────────────────────────────────
//  Camera
// ─────────────────────────────────────────────────────────────
async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop())
  const constraints = {
    video: {
      facingMode,
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  }
  stream = await navigator.mediaDevices.getUserMedia(constraints)
  video.srcObject = stream
  await new Promise(r => { video.onloadedmetadata = r })
  await video.play()
}

// ─────────────────────────────────────────────────────────────
//  Preprocess: video frame → normalized tensor
// ─────────────────────────────────────────────────────────────
function preprocessFrame() {
  const size = CONFIG.inputSize
  const vw = video.videoWidth || size
  const vh = video.videoHeight || size
  const scale = Math.max(size / vw, size / vh)
  const sw = Math.round(vw * scale)
  const sh = Math.round(vh * scale)
  const sx = Math.floor((sw - size) / 2)
  const sy = Math.floor((sh - size) / 2)
  // Step 1: resize to intermediate (matches PIL BILINEAR resize)
  if (resizeCanvas.width !== sw || resizeCanvas.height !== sh) {
    resizeCanvas.width = sw; resizeCanvas.height = sh
  }
  resizeCtx.drawImage(video, 0, 0, sw, sh)
  // Step 2: pixel-exact center crop (matches PIL crop)
  offCtx.drawImage(resizeCanvas, sx, sy, size, size, 0, 0, size, size)
  const { data } = offCtx.getImageData(0, 0, size, size)  // RGBA, HWC

  // convert RGBA HWC → CHW Float32 with ImageNet normalization
  const n = size * size
  const float32 = new Float32Array(3 * n)
  const [mr, mg, mb] = CONFIG.mean
  const [sr, sg, sb] = CONFIG.std
  for (let i = 0; i < n; i++) {
    float32[i]         = (data[i * 4]     / 255 - mr) / sr  // R
    float32[i + n]     = (data[i * 4 + 1] / 255 - mg) / sg  // G
    float32[i + n * 2] = (data[i * 4 + 2] / 255 - mb) / sb  // B
  }
  return new ort.Tensor('float32', float32, [1, 3, size, size])
}

// ─────────────────────────────────────────────────────────────
//  Inference
// ─────────────────────────────────────────────────────────────
async function runInference(tensor) {
  // Demo mode: random probs
  if (CONFIG.demoMode || !session) {
    const raw = CONFIG.labels.map(() => Math.random())
    const sum = raw.reduce((a, b) => a + b, 0)
    return raw.map(v => v / sum)
  }
  const results = await session.run({ input: tensor })
  // use first output key dynamically — avoids silent failure if model names it differently
  const logits  = Array.from(results[Object.keys(results)[0]].data)
  console.log('logits:', logits)
  // softmax
  const maxL = Math.max(...logits)
  const exp  = logits.map(x => Math.exp(x - maxL))
  const sum  = exp.reduce((a, b) => a + b, 0)
  return exp.map(x => x / sum)
}

// ─────────────────────────────────────────────────────────────
//  Grad-CAM
// ─────────────────────────────────────────────────────────────
async function runGradCAM(classIdx) {
  // ONNX Runtime Web does not expose intermediate gradients;
  // real Grad-CAM needs a separate feature-extractor export.
  // Placeholder: radial demo heatmap.
  drawDemoHeatmap()
}

// Jet colormap renderer
function drawJetHeatmap(data, w, h) {
  const imageData = gradcamCtx.createImageData(w, h)
  for (let i = 0; i < data.length; i++) {
    const v = data[i]
    // Jet: blue → cyan → green → yellow → red
    let r, g, b
    if (v < 0.125) { r = 0; g = 0; b = 0.5 + v * 4 }
    else if (v < 0.375) { r = 0; g = (v - 0.125) * 4; b = 1 }
    else if (v < 0.625) { r = (v - 0.375) * 4; g = 1; b = 1 - (v - 0.375) * 4 }
    else if (v < 0.875) { r = 1; g = 1 - (v - 0.625) * 4; b = 0 }
    else { r = 1 - (v - 0.875) * 4; g = 0; b = 0 }
    const pi = i * 4
    imageData.data[pi]     = Math.round(r * 255)
    imageData.data[pi + 1] = Math.round(g * 255)
    imageData.data[pi + 2] = Math.round(b * 255)
    imageData.data[pi + 3] = Math.round(v * 200 + 30)  // alpha mapped to intensity
  }
  gradcamCanvas.width = w
  gradcamCanvas.height = h
  gradcamCtx.putImageData(imageData, 0, 0)
}

// Demo heatmap (radial gradient in center)
function drawDemoHeatmap() {
  const w = CONFIG.inputSize, h = CONFIG.inputSize
  const data = new Float32Array(w * h)
  const cx = w * (0.35 + Math.random() * 0.3)
  const cy = h * (0.35 + Math.random() * 0.3)
  const r  = Math.min(w, h) * (0.2 + Math.random() * 0.2)
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const d = Math.hypot(x - cx, y - cy)
      data[y * w + x] = Math.max(0, 1 - d / r)
    }
  }
  drawJetHeatmap(data, w, h)
}

// ─────────────────────────────────────────────────────────────
//  Update UI
// ─────────────────────────────────────────────────────────────
function updateUI(probs) {
  const topIdx   = probs.indexOf(Math.max(...probs))
  const conf     = probs[topIdx]
  const isNormal = topIdx === CONFIG.normalClassIndex
  const isSevere = CONFIG.severeClasses.includes(topIdx)
  const label = CONFIG.labels[topIdx]

  document.getElementById('class-label').textContent =
    conf < CONFIG.confidenceThreshold ? '--' : label
  document.getElementById('conf-badge').textContent =
    Math.round(conf * 100) + '%'
  document.getElementById('conf-fill').style.width =
    Math.round(conf * 100) + '%'

  // Body state: normal / warn (minor defect) / defect (severe)
  document.body.className =
    conf < CONFIG.confidenceThreshold ? '' :
    isNormal ? 'state-normal' :
    isSevere ? 'state-defect' : 'state-warn'

  // Per-class bars (show CN name)
  probs.forEach((p, i) => {
    const fill = document.getElementById('bar-' + i)
    const val  = document.getElementById('barval-' + i)
    if (!fill) return
    fill.style.width = Math.round(p * 100) + '%'
    fill.className = 'bar-fill' + (i === topIdx ? ' top' : '')
    val.textContent = Math.round(p * 100) + '%'
  })

  return { topIdx, conf }
}

// ─────────────────────────────────────────────────────────────
//  FPS counter
// ─────────────────────────────────────────────────────────────
function updateFps() {
  frameCount++
  const now = performance.now()
  if (now - lastFpsTime >= 1000) {
    document.getElementById('fps-counter').textContent =
      frameCount + ' fps'
    frameCount = 0
    lastFpsTime = now
  }
}

// ─────────────────────────────────────────────────────────────
//  Main inference loop
// ─────────────────────────────────────────────────────────────
let loopRunning = false
async function inferenceLoop() {
  if (!isRunning || isPaused || loopRunning) return
  loopRunning = true

  const tensor = preprocessFrame()

  try {
    const rawProbs = await runInference(tensor)
    // EMA smoothing to dampen per-frame camera noise
    if (!smoothedProbs) {
      smoothedProbs = rawProbs.slice()
    } else {
      smoothedProbs = smoothedProbs.map((v, i) => v * (1 - EMA_ALPHA) + rawProbs[i] * EMA_ALPHA)
    }
    const probs = smoothedProbs
    const { topIdx } = updateUI(probs)

    if (showGradcam && (topIdx !== lastTopIdx || Math.random() < 0.05)) {
      await runGradCAM(topIdx)
      lastTopIdx = topIdx
    }
  } catch (e) {
    console.error('inference error:', e)
  } finally {
    loopRunning = false
  }

  updateFps()
  requestAnimationFrame(inferenceLoop)
}

// ─────────────────────────────────────────────────────────────
//  Controls
// ─────────────────────────────────────────────────────────────
function toggleGradcam() {
  showGradcam = !showGradcam
  document.getElementById('btn-gradcam').classList.toggle('active', showGradcam)
  gradcamCanvas.classList.toggle('visible', showGradcam)
  if (!showGradcam) {
    gradcamCtx.clearRect(0, 0, gradcamCanvas.width, gradcamCanvas.height)
  }
}

function togglePause() {
  isPaused = !isPaused
  document.getElementById('btn-pause').classList.toggle('active', isPaused)
  document.getElementById('scan-line').style.animationPlayState =
    isPaused ? 'paused' : 'running'
  if (!isPaused) { smoothedProbs = null; requestAnimationFrame(inferenceLoop) }
}



// ─────────────────────────────────────────────────────────────
//  Image upload test
// ─────────────────────────────────────────────────────────────
async function testImage(input) {
  const file = input.files[0]
  if (!file) return
  input.value = ''

  const overlay = document.getElementById('test-overlay')
  const imgEl   = document.getElementById('test-img')
  const resultEl = document.getElementById('test-result')
  const barsEl  = document.getElementById('test-bars')

  if (testObjectURL) { URL.revokeObjectURL(testObjectURL) }
  testObjectURL = URL.createObjectURL(file)
  imgEl.src = testObjectURL          // display uses browser auto-rotation (correct for user)
  overlay.style.display = 'flex'
  resultEl.textContent = 'Running inference...'
  barsEl.innerHTML = ''

  await new Promise(r => { imgEl.onload = r })

  // Use createImageBitmap with imageOrientation:'none' so inference sees raw JPEG bytes —
  // the same pixel layout PIL.Image.open() returns (no EXIF auto-rotation).
  // Browser <img> applies EXIF rotation for display, but that would feed the model
  // differently than Colab/training, causing wrong-class predictions on phone photos.
  let source
  try {
    source = await createImageBitmap(file, { imageOrientation: 'none' })
  } catch (_) {
    // Fallback for browsers that don't support imageOrientation option
    source = imgEl
  }

  const size = CONFIG.inputSize
  const iw = source.naturalWidth  || source.width   // naturalWidth for <img>, width for ImageBitmap
  const ih = source.naturalHeight || source.height
  const scale = Math.max(size / iw, size / ih)
  const sw = Math.round(iw * scale)
  const sh = Math.round(ih * scale)
  const sx = Math.floor((sw - size) / 2)
  const sy = Math.floor((sh - size) / 2)

  // Two-step: resize → center-crop (matches PIL Resize+CenterCrop)
  // Explicit sRGB color space to avoid Display P3 pixel drift on iOS Safari
  const resized = document.createElement('canvas')
  resized.width = sw; resized.height = sh
  resized.getContext('2d', { colorSpace: 'srgb' }).drawImage(source, 0, 0, sw, sh)

  const crop = document.createElement('canvas')
  crop.width = size; crop.height = size
  const cropCtx = crop.getContext('2d', { colorSpace: 'srgb', willReadFrequently: true })
  cropCtx.drawImage(resized, sx, sy, size, size, 0, 0, size, size)

  const { data } = cropCtx.getImageData(0, 0, size, size)
  const n = size * size
  const float32 = new Float32Array(3 * n)
  const [mr, mg, mb] = CONFIG.mean
  const [sr, sg, sb] = CONFIG.std
  for (let i = 0; i < n; i++) {
    float32[i]         = (data[i * 4]     / 255 - mr) / sr
    float32[i + n]     = (data[i * 4 + 1] / 255 - mg) / sg
    float32[i + n * 2] = (data[i * 4 + 2] / 255 - mb) / sb
  }
  const tensor = new ort.Tensor('float32', float32, [1, 3, size, size])
  {
    let _min = Infinity, _max = -Infinity, _sum = 0
    for (let i = 0; i < float32.length; i++) {
      if (float32[i] < _min) _min = float32[i]
      if (float32[i] > _max) _max = float32[i]
      _sum += float32[i]
    }
    console.log('tensor stats:',
      'min=', _min,
      'max=', _max,
      'mean=', _sum / float32.length,
      'first10=', Array.from(float32.slice(0, 10))
    )
  }

  let probs
  try {
    probs = await runInference(tensor)
    console.log('[testImage] probs:', CONFIG.labels.map((l, i) => `${l}:${(probs[i]*100).toFixed(1)}%`))
  } catch (e) {
    resultEl.textContent = 'Inference failed: ' + e.message
    console.error('[testImage] error:', e)
    return
  }

  const topIdx = probs.indexOf(Math.max(...probs))
  const conf   = probs[topIdx]
  const isNormal = topIdx === CONFIG.normalClassIndex
  const isSevere = CONFIG.severeClasses.includes(topIdx)
  const color = isNormal ? 'var(--green)' : isSevere ? 'var(--red)' : 'var(--amber)'

  resultEl.innerHTML = `
    <span style="color:${color}">${CONFIG.labels[topIdx]}</span>
    <span style="font-size:14px;color:${color};margin-left:8px">${Math.round(conf*100)}%</span>
  `

  const sorted = probs
    .map((p, i) => ({ p, i }))
    .sort((a, b) => b.p - a.p)

  barsEl.innerHTML = sorted.map(({ p, i }) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);width:52px;flex-shrink:0">${CONFIG.labels[i]}</div>
      <div style="flex:1;height:3px;background:#222;border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${Math.round(p*100)}%;background:${i===topIdx?color:'#444'};border-radius:2px"></div>
      </div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);width:34px;text-align:right">${Math.round(p*100)}%</div>
    </div>
  `).join('')
}

function closeTest() {
  document.getElementById('test-overlay').style.display = 'none'
  if (testObjectURL) { URL.revokeObjectURL(testObjectURL); testObjectURL = null }
}

// ─────────────────────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────────────────────
async function boot() {
  initBars()
  document.getElementById('version-tag').textContent = CONFIG.version
  setLoadingStatus('Requesting camera permission...', 10)

  try {
    await startCamera()
  } catch (e) {
    setLoadingStatus('Camera access denied: ' + e.message, 100)
    return
  }

  setLoadingStatus('Loading AI model...', 40)
  session = await loadModel()
  setLoadingStatus('Ready', 100)

  await new Promise(r => setTimeout(r, 300))
  hideLoading()

  isRunning = true
  requestAnimationFrame(inferenceLoop)
}

boot().catch(e => {
  console.error(e)
  setLoadingStatus('Boot failed: ' + e.message, 100)
})
</script>
