<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;500;600&display=swap');

  :root {
    --bg:         #06090f;
    --border:     #131f2e;
    --border-hi:  #1c3048;
    --text:       #c9d6e3;
    --muted:      #445566;
    --accent:     #00c8ff;
    --accent-dim: rgba(0,200,255,.08);
    --green:      #00e676;
    --amber:      #ffca28;
    --red:        #ff5252;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    user-select: none;
  }

  /* ── Camera ──────────────────────────────────────────── */
  #camera-wrap {
    position: fixed; inset: 0;
    background: #000;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── Ambient glow vignette ───────────────────────────── */
  #vignette {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 90% 50% at 50% 110%, rgba(0,200,255,.06) 0%, transparent 65%),
      radial-gradient(ellipse 70% 40% at 50% -10%, rgba(0,200,255,.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 2;
  }

  /* ── Scan frame ──────────────────────────────────────── */
  #scan-frame {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(72vw, 290px);
    height: min(72vw, 290px);
    pointer-events: none;
    z-index: 5;
  }

  .corner {
    position: absolute;
    width: 26px; height: 26px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.85;
    transition: border-color .4s, opacity .4s;
  }
  .corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  /* Corner terminal dots */
  .corner::after {
    content: '';
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    transition: background .4s;
  }
  .corner.tl::after { top: -2px; left: -2px; }
  .corner.tr::after { top: -2px; right: -2px; }
  .corner.bl::after { bottom: -2px; left: -2px; }
  .corner.br::after { bottom: -2px; right: -2px; }

  /* Mid-edge tick marks */
  .frame-tick {
    position: absolute;
    background: var(--accent);
    opacity: 0.22;
    transition: background .4s, opacity .4s;
  }
  .tick-top, .tick-bottom {
    width: 1px; height: 7px;
    left: 50%; transform: translateX(-50%);
  }
  .tick-left, .tick-right {
    height: 1px; width: 7px;
    top: 50%; transform: translateY(-50%);
  }
  .tick-top    { top: 0; }
  .tick-bottom { bottom: 0; }
  .tick-left   { left: 0; }
  .tick-right  { right: 0; }

  /* Crosshair center dot */
  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.45;
    box-shadow: 0 0 8px var(--accent);
    transition: background .4s, box-shadow .4s;
  }

  /* Scan line */
  #scan-line {
    position: absolute;
    left: 2px; right: 2px;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0,200,255,.4) 15%,
      var(--accent) 40%,
      rgba(255,255,255,.95) 50%,
      var(--accent) 60%,
      rgba(0,200,255,.4) 85%,
      transparent 100%);
    box-shadow: 0 0 10px 2px rgba(0,200,255,.35);
    animation: scan 2.4s ease-in-out infinite;
    opacity: 0.75;
  }
  @keyframes scan {
    0%   { top: 2px; }
    100% { top: calc(100% - 2px); }
  }

  /* ── Grad-CAM canvas ─────────────────────────────────── */
  #gradcam-canvas {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(72vw, 290px);
    height: min(72vw, 290px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
    z-index: 4;
  }
  #gradcam-canvas.visible { opacity: 0.6; }

  /* ── Top bar ─────────────────────────────────────────── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: env(safe-area-inset-top, 14px) 18px 14px;
    background: linear-gradient(180deg, rgba(6,9,15,.9) 0%, transparent 100%);
    z-index: 10;
  }

  #logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .logo-mark {
    width: 22px; height: 22px;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,200,255,.07);
    flex-shrink: 0;
  }
  .logo-mark svg { opacity: .8; }
  .logo-text {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .22em;
    color: var(--accent);
    text-transform: uppercase;
    line-height: 1;
  }
  #version-tag {
    font-size: 8px;
    opacity: 0.35;
    letter-spacing: .06em;
    display: block;
    margin-top: 2px;
  }

  #topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #model-badge {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .1em;
    color: var(--muted);
    border: 1px solid var(--border-hi);
    border-radius: 3px;
    padding: 2px 6px;
    text-transform: uppercase;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #status-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .4s, box-shadow .4s;
  }
  #fps-counter {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .05em;
    min-width: 42px;
    text-align: right;
  }

  /* ── Result card ─────────────────────────────────────── */
  #result-card {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 0 18px calc(env(safe-area-inset-bottom, 0px) + 20px);
    background: linear-gradient(0deg,
      rgba(6,9,15,.97) 0%,
      rgba(6,9,15,.88) 55%,
      transparent 100%);
    z-index: 10;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 20px;
    margin-bottom: 14px;
  }
  .panel-title {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .24em;
    color: var(--muted);
    white-space: nowrap;
  }
  .panel-divider {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-hi) 0%, transparent 100%);
  }
  #panel-status {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .18em;
    color: var(--muted);
    transition: color .35s;
  }

  #label-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  #class-label {
    font-family: var(--mono);
    font-size: 28px;
    letter-spacing: .04em;
    color: var(--text);
    transition: color .25s;
    line-height: 1;
  }
  #conf-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--muted);
    color: var(--muted);
    letter-spacing: .1em;
    transition: border-color .25s, color .25s, background .25s;
  }

  /* Confidence bar */
  .conf-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .conf-meta-label {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .16em;
    color: var(--muted);
  }
  .conf-meta-ticks {
    font-family: var(--mono);
    font-size: 7px;
    color: var(--border-hi);
    letter-spacing: .04em;
    display: flex;
    gap: 6px;
  }

  #conf-wrap {
    position: relative;
    height: 3px;
    background: var(--border);
    border-radius: 1px;
    margin-bottom: 16px;
    overflow: visible;
  }
  #conf-fill {
    height: 100%;
    border-radius: 1px;
    background: var(--accent);
    width: 0%;
    transition: width .15s ease-out, background .25s;
  }
  .conf-notch {
    position: absolute;
    top: -4px; bottom: -4px;
    width: 1px;
    background: var(--border-hi);
    pointer-events: none;
  }

  /* Class bars */
  #class-bars { display: grid; gap: 7px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-name {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .07em;
    color: var(--muted);
    width: 80px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
  }
  .bar-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 1px;
    background: var(--border-hi);
    width: 0%;
    transition: width .15s ease-out, background .25s;
  }
  .bar-fill.top { background: var(--accent); }
  .bar-val {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    width: 30px;
    text-align: right;
  }

  /* ── Action buttons ──────────────────────────────────── */
  #actions {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .action-btn {
    width: 46px; height: 46px;
    border-radius: 10px;
    border: 1px solid var(--border-hi);
    background: rgba(13,21,32,.82);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: border-color .2s, color .2s, background .2s, box-shadow .2s;
    backdrop-filter: blur(14px);
  }
  .action-btn:active { transform: scale(.91); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .action-btn.cam-loading svg { animation: btn-spin 1s linear infinite; }
  @keyframes btn-spin { to { transform: rotate(360deg); } }
  .action-btn.cam-shake { animation: btn-shake .35s ease; }
  @keyframes btn-shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-4px); }
    40%      { transform: translateX(4px); }
    60%      { transform: translateX(-3px); }
    80%      { transform: translateX(3px); }
  }
  .action-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 12px rgba(0,200,255,.18), inset 0 0 10px rgba(0,200,255,.06);
  }
  .btn-label {
    font-family: var(--mono);
    font-size: 6.5px;
    letter-spacing: .08em;
    line-height: 1;
  }

  /* ── Loading screen ──────────────────────────────────── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    z-index: 100;
    transition: opacity .6s;
  }
  #loading::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,.025) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
  }
  #loading::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 40%, var(--bg) 100%);
    pointer-events: none;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  #loading-logo {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .36em;
    color: var(--accent);
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #loading-logo::before {
    content: '◈';
    font-size: 16px;
    animation: logo-pulse 1.6s ease-in-out infinite;
  }
  @keyframes logo-pulse {
    0%, 100% { opacity: .25; transform: scale(.9); }
    50%       { opacity: .9;  transform: scale(1.05); }
  }

  #loading-bar-track {
    width: 180px; height: 1px;
    background: var(--border);
    position: relative;
    z-index: 1;
  }
  #loading-bar-track::before,
  #loading-bar-track::after {
    content: '';
    position: absolute;
    top: -3px;
    width: 1px; height: 7px;
    background: var(--border-hi);
  }
  #loading-bar-track::before { left: 0; }
  #loading-bar-track::after  { right: 0; }
  #loading-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .3s ease-out;
    box-shadow: 0 0 8px var(--accent);
  }
  #loading-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .1em;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* ── State color themes ──────────────────────────────── */
  body.state-normal    #class-label { color: var(--green); }
  body.state-defect    #class-label { color: var(--red);   }
  body.state-warn      #class-label { color: var(--amber); }
  body.state-uncertain #class-label { color: var(--muted); }

  body.state-normal    #conf-badge { border-color: var(--green); color: var(--green); background: rgba(0,230,118,.06); }
  body.state-defect    #conf-badge { border-color: var(--red);   color: var(--red);   background: rgba(255,82,82,.06); }
  body.state-warn      #conf-badge { border-color: var(--amber); color: var(--amber); background: rgba(255,202,40,.06); }
  body.state-uncertain #conf-badge { border-color: var(--muted); color: var(--muted); background: transparent; }

  body.state-normal    #conf-fill { background: var(--green); }
  body.state-defect    #conf-fill { background: var(--red);   }
  body.state-warn      #conf-fill { background: var(--amber); }
  body.state-uncertain #conf-fill { background: var(--muted); }

  body.state-normal    .corner { border-color: var(--green); }
  body.state-defect    .corner { border-color: var(--red);   }
  body.state-warn      .corner { border-color: var(--amber); }
  body.state-uncertain .corner { border-color: var(--muted); }

  body.state-normal    .corner::after { background: var(--green); }
  body.state-defect    .corner::after { background: var(--red);   }
  body.state-warn      .corner::after { background: var(--amber); }
  body.state-uncertain .corner::after { background: var(--muted); }

  body.state-normal    .frame-tick { background: var(--green); opacity: .3; }
  body.state-defect    .frame-tick { background: var(--red);   opacity: .3; }
  body.state-warn      .frame-tick { background: var(--amber); opacity: .3; }
  body.state-uncertain .frame-tick { background: var(--muted); opacity: .2; }

  body.state-normal    #crosshair { background: var(--green); box-shadow: 0 0 8px var(--green); }
  body.state-defect    #crosshair { background: var(--red);   box-shadow: 0 0 8px var(--red);   }
  body.state-warn      #crosshair { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  body.state-uncertain #crosshair { background: var(--muted); box-shadow: none; }

  body.state-normal    #status-dot { background: var(--green); box-shadow: 0 0 7px var(--green); }
  body.state-defect    #status-dot { background: var(--red);   box-shadow: 0 0 7px var(--red);   }
  body.state-warn      #status-dot { background: var(--amber); box-shadow: 0 0 7px var(--amber); }
  body.state-uncertain #status-dot { background: var(--muted); box-shadow: none; }

  body.state-normal    #panel-status { color: var(--green); }
  body.state-defect    #panel-status { color: var(--red);   }
  body.state-warn      #panel-status { color: var(--amber); }
  body.state-uncertain #panel-status { color: var(--muted); }

  body.state-normal    .bar-fill.top { background: var(--green) !important; box-shadow: 0 0 5px rgba(0,230,118,.5); }
  body.state-defect    .bar-fill.top { background: var(--red)   !important; box-shadow: 0 0 5px rgba(255,82,82,.5);  }
  body.state-warn      .bar-fill.top { background: var(--amber) !important; box-shadow: 0 0 5px rgba(255,202,40,.5);}
  body.state-uncertain .bar-fill.top { background: var(--muted) !important; box-shadow: none; }

  /* ── Model picker ────────────────────────────────────── */
  #model-picker {
    position: fixed;
    right: 72px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(10,17,28,.97);
    border: 1px solid var(--border-hi);
    border-radius: 10px;
    padding: 6px;
    display: none;
    flex-direction: column;
    gap: 2px;
    backdrop-filter: blur(20px);
    z-index: 50;
    min-width: 168px;
    box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(0,200,255,.04);
  }
  #model-picker.visible { display: flex; }

  .picker-header {
    font-family: var(--mono);
    font-size: 7.5px;
    letter-spacing: .24em;
    color: var(--muted);
    padding: 6px 10px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }
  .model-opt {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .06em;
    color: var(--muted);
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 9px 10px;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    transition: border-color .15s, color .15s, background .15s;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .model-opt-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    border: 1px solid currentColor;
    flex-shrink: 0;
    transition: background .15s;
  }
  .model-opt:active { transform: scale(.97); }
  .model-opt.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .model-opt.active .model-opt-dot { background: var(--accent); border-color: var(--accent); }

  /* ── Model switch overlay ────────────────────────────── */
  #model-switch-overlay {
    position: fixed; inset: 0;
    background: rgba(6,9,15,.88);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 90;

  #model-switch-label {

  #model-switch-bar-track {
    width: 180px; height: 1px;

  #model-switch-bar-fill {

  /* ── Test overlay ────────────────────────────────────── */

  #test-card {

  #test-img {

  #test-close:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>

">

  </div>
  <div id="class-bars"></div>
</div>

<!-- ONNX Runtime Web -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.25.1/dist/ort.min.js"></script>

<script>
// ─────────────────────────────────────────────────────────────
//  ORT config
// ─────────────────────────────────────────────────────────────
ort.env.wasm.numThreads = 1

// ─────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────
let session = null
let camSession = null    // dual-output ONNX session for real CAM heatmaps
let camLoading = false   // prevents concurrent cam session loads
let isRunning = false
let isPaused = false
let showGradcam = false
let stream = null
let lastFpsTime = performance.now()
let frameCount = 0
let testObjectURL = null
let _testPaused = false           // tracks whether testImage() paused inference
let smoothedProbs = null          // EMA smoothed probabilities
const EMA_ALPHA = 0.25            // lower = smoother but slower to react

// offscreen canvases for two-step preprocessing (resize then crop, matching PIL)
// colorSpace:'srgb' forces sRGB on iOS Safari (avoids Display P3 value drift)
const offscreen = document.createElement('canvas')
offscreen.width  = CONFIG.inputSize
offscreen.height = CONFIG.inputSize
const offCtx = offscreen.getContext('2d', { colorSpace: 'srgb', willReadFrequently: true })
const resizeCanvas = document.createElement('canvas')  // intermediate resize canvas
const resizeCtx = resizeCanvas.getContext('2d', { colorSpace: 'srgb' })

// pre-allocated preprocessing buffer — reused every frame to avoid per-frame GC pressure
let preprocessBuf = new Float32Array(3 * CONFIG.inputSize * CONFIG.inputSize)
// pre-allocated CAM slice buffer — resized lazily when H*W grows
let camSliceBuf = null

const video = document.getElementById('video')
const gradcamCanvas = document.getElementById('gradcam-canvas')
const gradcamCtx = gradcamCanvas.getContext('2d')

// ─────────────────────────────────────────────────────────────
//  Loading helpers
// ─────────────────────────────────────────────────────────────
function setLoadingStatus(msg, pct) {
  const s = document.getElementById('loading-status')
  const b = document.getElementById('loading-bar-fill')
  if (s) s.textContent = msg
  if (b && pct != null) b.style.width = pct + '%'
}

function hideLoading() {
  const el = document.getElementById('loading')
  el.classList.add('hidden')
  setTimeout(() => el.remove(), 600)
}

// ─────────────────────────────────────────────────────────────
//  Init class bars
// ─────────────────────────────────────────────────────────────
function initBars() {
  const container = document.getElementById('class-bars')
  container.innerHTML = CONFIG.labels.map((label, i) => `
    <div class="bar-row">
      <div class="bar-name">${label}</div>
      <div class="bar-track"><div class="bar-fill" id="bar-${i}"></div></div>
      <div class="bar-val" id="barval-${i}">0%</div>
    </div>
  `).join('')
}

// ─────────────────────────────────────────────────────────────
//  Model loading
// ─────────────────────────────────────────────────────────────
async function loadModel() {
  if (CONFIG.demoMode) {
    console.warn('demo mode: returning random inference results')
    return null
  }
  try {
    setLoadingStatus('Loading model...', 30)
    const sess = await ort.InferenceSession.create(CONFIG.modelUrl, {
      executionProviders: ['wasm'],           // WASM is more consistent than WebGL on mobile
      externalData: [
        { path: CONFIG.modelDataFile, data: CONFIG.modelDataUrl }
      ],
    })
    setLoadingStatus('Warming up...', 70)
    // warm-up run to eliminate first-frame latency spike
    const dummyData = new Float32Array(1 * 3 * CONFIG.inputSize * CONFIG.inputSize)
    const dummyTensor = new ort.Tensor('float32', dummyData,
      [1, 3, CONFIG.inputSize, CONFIG.inputSize])
    await sess.run({ input: dummyTensor })
    return sess
  } catch (e) {
    console.error('model load failed:', e)
    setLoadingStatus('Model load failed — switching to demo mode', 100)
    CONFIG.demoMode = true
    return null
  }
}

// ─────────────────────────────────────────────────────────────
//  Camera
// ─────────────────────────────────────────────────────────────
async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop())
  const constraints = {
    video: {
      facingMode: 'environment',
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  }
  stream = await navigator.mediaDevices.getUserMedia(constraints)
  video.srcObject = stream
  await new Promise(r => { video.onloadedmetadata = r })
  await video.play()
}

// ─────────────────────────────────────────────────────────────
//  Preprocess: video frame → normalized tensor
// ─────────────────────────────────────────────────────────────
function preprocessFrame() {
  const size = CONFIG.inputSize
  const vw = video.videoWidth || size
  const vh = video.videoHeight || size
  const scale = Math.max(size / vw, size / vh)
  const sw = Math.round(vw * scale)
  const sh = Math.round(vh * scale)
  const sx = Math.floor((sw - size) / 2)
  const sy = Math.floor((sh - size) / 2)
  // Step 1: resize to intermediate (matches PIL BILINEAR resize)
  if (resizeCanvas.width !== sw || resizeCanvas.height !== sh) {
    resizeCanvas.width = sw; resizeCanvas.height = sh
  }
  resizeCtx.drawImage(video, 0, 0, sw, sh)
  // Step 2: pixel-exact center crop (matches PIL crop)
  offCtx.drawImage(resizeCanvas, sx, sy, size, size, 0, 0, size, size)
  const { data } = offCtx.getImageData(0, 0, size, size)  // RGBA, HWC

  // convert RGBA HWC → CHW Float32 with ImageNet normalization (reuse buffer to avoid GC)
  const n = size * size
  const float32 = preprocessBuf
  const [mr, mg, mb] = CONFIG.mean
  const [sr, sg, sb] = CONFIG.std
  for (let i = 0; i < n; i++) {
    float32[i]         = (data[i * 4]     / 255 - mr) / sr  // R
    float32[i + n]     = (data[i * 4 + 1] / 255 - mg) / sg  // G
    float32[i + n * 2] = (data[i * 4 + 2] / 255 - mb) / sb  // B
  }
  return new ort.Tensor('float32', float32, [1, 3, size, size])
}

// ─────────────────────────────────────────────────────────────
//  Inference
// ─────────────────────────────────────────────────────────────
async function runInference(tensor) {
  // Demo mode: random probs
  if (CONFIG.demoMode || !session) {
    const raw = CONFIG.labels.map(() => Math.random())
    const sum = raw.reduce((a, b) => a + b, 0)
    return raw.map(v => v / sum)
  }
  const results = await session.run({ input: tensor })
  // use first output key dynamically — avoids silent failure if model names it differently
  const logits  = Array.from(results[Object.keys(results)[0]].data)
  // softmax
  const maxL = Math.max(...logits)
  const exp  = logits.map(x => Math.exp(x - maxL))
  const sum  = exp.reduce((a, b) => a + b, 0)
  return exp.map(x => x / sum)
}

// ─────────────────────────────────────────────────────────────
//  CAM rendering
// ─────────────────────────────────────────────────────────────

// Render cam[classIdx] slice (shape [H,W], already [0,1] from model) using jet colormap.
// The canvas is CSS-scaled to the scan frame size automatically.
function drawRealCAM(camData, H, W, classIdx) {
  const offset = classIdx * H * W
  // camData may be a TypedArray view over WASM memory; copy the slice into a reused buffer
  if (!camSliceBuf || camSliceBuf.length < H * W) camSliceBuf = new Float32Array(H * W)
  const slice = camSliceBuf
  for (let i = 0; i < H * W; i++) slice[i] = camData[offset + i]
  // Renormalize in case model output isn't perfectly in [0,1]
  let mn = Infinity, mx = -Infinity
  for (let i = 0; i < slice.length; i++) {
    if (slice[i] < mn) mn = slice[i]
    if (slice[i] > mx) mx = slice[i]
  }
  const range = mx - mn || 1
  for (let i = 0; i < slice.length; i++) slice[i] = (slice[i] - mn) / range
  drawJetHeatmap(slice, W, H)
}

// Jet colormap renderer
function drawJetHeatmap(data, w, h) {
  const imageData = gradcamCtx.createImageData(w, h)
  for (let i = 0; i < data.length; i++) {
    const v = data[i]
    // Jet: blue → cyan → green → yellow → red
    let r, g, b
    if (v < 0.125) { r = 0; g = 0; b = 0.5 + v * 4 }
    else if (v < 0.375) { r = 0; g = (v - 0.125) * 4; b = 1 }
    else if (v < 0.625) { r = (v - 0.375) * 4; g = 1; b = 1 - (v - 0.375) * 4 }
    else if (v < 0.875) { r = 1; g = 1 - (v - 0.625) * 4; b = 0 }
    else { r = 1 - (v - 0.875) * 4; g = 0; b = 0 }
    const pi = i * 4
    imageData.data[pi]     = Math.round(r * 255)
    imageData.data[pi + 1] = Math.round(g * 255)
    imageData.data[pi + 2] = Math.round(b * 255)
    imageData.data[pi + 3] = Math.round(v * 200 + 30)  // alpha mapped to intensity
  }
  if (gradcamCanvas.width !== w || gradcamCanvas.height !== h) {
    gradcamCanvas.width = w
    gradcamCanvas.height = h
  }
  gradcamCtx.putImageData(imageData, 0, 0)
}

// ─────────────────────────────────────────────────────────────
//  Update UI
// ─────────────────────────────────────────────────────────────
function updateUI(probs) {
  const topIdx   = probs.indexOf(Math.max(...probs))
  const conf     = probs[topIdx]   // Maximum Softmax Probability (MSP)
  const rejected = conf < CONFIG.mspThreshold   // OE rejection gate
  const isNormal = topIdx === CONFIG.normalClassIndex
  const isSevere = CONFIG.severeClasses.includes(topIdx)
  const label = CONFIG.labels[topIdx]

  document.getElementById('class-label').textContent =
    rejected ? 'out of scope' : label
  document.getElementById('conf-badge').textContent =
    Math.round(conf * 100) + '%'
  document.getElementById('conf-fill').style.width =
    Math.round(conf * 100) + '%'

  // Body state: rejected → uncertain; else normal / warn / defect
  document.body.className =
    rejected  ? 'state-uncertain' :
    isNormal  ? 'state-normal' :
    isSevere  ? 'state-defect' : 'state-warn'

  // Panel status text
  const statusEl = document.getElementById('panel-status')
  if (statusEl) statusEl.textContent =
    rejected  ? 'OUT OF SCOPE' :
    isNormal  ? 'CLEAR' :
    isSevere  ? 'ALERT' : 'CAUTION'

  // Per-class bars
  probs.forEach((p, i) => {
    const fill = document.getElementById('bar-' + i)
    const val  = document.getElementById('barval-' + i)
    if (!fill) return
    fill.style.width = Math.round(p * 100) + '%'
    fill.className = 'bar-fill' + (i === topIdx ? ' top' : '')
    val.textContent = Math.round(p * 100) + '%'
  })

  return { topIdx, conf }
}

// ─────────────────────────────────────────────────────────────
//  FPS counter
// ─────────────────────────────────────────────────────────────
function updateFps() {
  frameCount++
  const now = performance.now()
  if (now - lastFpsTime >= 1000) {
    document.getElementById('fps-counter').textContent =
      frameCount + ' FPS'
    frameCount = 0
    lastFpsTime = now
  }
}

// ─────────────────────────────────────────────────────────────
//  Main inference loop
// ─────────────────────────────────────────────────────────────
let loopRunning = false
async function inferenceLoop() {
  if (!isRunning || isPaused || loopRunning) return
  loopRunning = true

  const tensor = preprocessFrame()

  let camFaulted = false
  try {
    let rawProbs, camOutput = null

    if (showGradcam && camSession && !CONFIG.demoMode) {
      // Run dual-output CAM session — one pass gives both logits and feature heatmap
      camFaulted = true
      const res = await camSession.run({ input: tensor })
      camFaulted = false
      const logits = Array.from(res.logits.data)
      const maxL = Math.max(...logits)
      const exp  = logits.map(x => Math.exp(x - maxL))
      const s    = exp.reduce((a, b) => a + b, 0)
      rawProbs   = exp.map(x => x / s)
      camOutput  = res.cam   // ORT Tensor: [1, num_classes, H, W]
    } else {
      rawProbs = await runInference(tensor)
    }

    // EMA smoothing to dampen per-frame camera noise
    if (!smoothedProbs) {
      smoothedProbs = rawProbs.slice()
    } else {
      smoothedProbs = smoothedProbs.map((v, i) => v * (1 - EMA_ALPHA) + rawProbs[i] * EMA_ALPHA)
    }
    const probs = smoothedProbs
    const { topIdx } = updateUI(probs)

    if (showGradcam && camOutput) {
      drawRealCAM(camOutput.data, camOutput.dims[2], camOutput.dims[3], topIdx)
    }
    // No fallback heatmap — canvas stays blank until a real CAM model is loaded
  } catch (e) {
    console.error('inference error:', e)
    // Circuit breaker: only disable CAM when the fault came from camSession.run itself
    if (camFaulted && camSession) {
      camSession = null
      showGradcam = false
      const heatBtn = document.getElementById('btn-gradcam')
      if (heatBtn) heatBtn.classList.remove('active')
      gradcamCanvas.classList.remove('visible')
    }
  } finally {
    loopRunning = false
  }

  updateFps()
  requestAnimationFrame(inferenceLoop)
}

// ─────────────────────────────────────────────────────────────
//  Controls
// ─────────────────────────────────────────────────────────────
async function toggleGradcam() {
  if (camLoading) return
  showGradcam = !showGradcam
  const btn = document.getElementById('btn-gradcam')
  btn.classList.toggle('active', showGradcam)

  if (!showGradcam) {
    gradcamCanvas.classList.remove('visible')
    gradcamCtx.clearRect(0, 0, gradcamCanvas.width, gradcamCanvas.height)
    return
  }

  // No CAM model configured for the current model → shake the button and explain
  if (!CONFIG.camModelUrl) {
    showGradcam = false
    btn.classList.remove('active')
    btn.classList.remove('cam-shake')
    void btn.offsetWidth  // force reflow to restart animation
    btn.classList.add('cam-shake')
    return
  }

  // Lazily load the CAM session on first enable
  if (!camSession) {
    camLoading = true
    btn.disabled = true
    btn.classList.add('cam-loading')
    try {
      const externalData = CONFIG.camDataUrl
        ? [{ path: CONFIG.camDataFile, data: CONFIG.camDataUrl }]
        : []
      camSession = await ort.InferenceSession.create(CONFIG.camModelUrl, {
        executionProviders: ['wasm'],
        ...(externalData.length ? { externalData } : {}),
      })
      // Warm-up run so first live frame doesn't stall (especially on mobile)
      const dummy = new ort.Tensor('float32',
        new Float32Array(1 * 3 * CONFIG.inputSize * CONFIG.inputSize),
        [1, 3, CONFIG.inputSize, CONFIG.inputSize])
      await camSession.run({ input: dummy })
    } catch (e) {
      console.error('CAM model load failed:', e)
      camSession = null
      showGradcam = false
      btn.classList.remove('active')
    }
    btn.classList.remove('cam-loading')
    btn.disabled = false
    camLoading = false
  }

  if (showGradcam) gradcamCanvas.classList.add('visible')
}

function togglePause() {
  isPaused = !isPaused
  document.getElementById('btn-pause').classList.toggle('active', isPaused)
  document.getElementById('scan-line').style.animationPlayState =
    isPaused ? 'paused' : 'running'
  if (!isPaused) { smoothedProbs = null; requestAnimationFrame(inferenceLoop) }
}

// ─────────────────────────────────────────────────────────────
//  Model picker
// ─────────────────────────────────────────────────────────────
let currentModelKey = MODELS[0].key
let pickerVisible = false

function updateModelBadge() {
  const el = document.getElementById('model-badge')
  if (el) el.textContent = CONFIG.name || CONFIG.key
}

function initModelPicker() {
  const picker = document.getElementById('model-picker')
  picker.querySelectorAll('.model-opt').forEach(el => el.remove())
  MODELS.forEach(m => {
    const btn = document.createElement('button')
    btn.className = 'model-opt' + (m.key === currentModelKey ? ' active' : '')
    btn.id = 'model-opt-' + m.key
    btn.onclick = () => switchModel(m.key)
    btn.innerHTML = `<span class="model-opt-dot"></span>${m.name}`
    picker.appendChild(btn)
  })
}

function toggleModelPicker() {
  pickerVisible = !pickerVisible
  document.getElementById('model-picker').classList.toggle('visible', pickerVisible)
  document.getElementById('btn-model').classList.toggle('active', pickerVisible)
}

function closeModelPicker() {
  pickerVisible = false
  document.getElementById('model-picker').classList.remove('visible')
  document.getElementById('btn-model').classList.remove('active')
}

async function switchModel(key) {
  if (key === currentModelKey) { closeModelPicker(); return }
  const def = MODELS.find(m => m.key === key)
  if (!def) return

  closeModelPicker()

  // Pause inference loop
  const wasRunning = isRunning
  isRunning = false
  smoothedProbs = null

  // Show switch overlay
  const overlay = document.getElementById('model-switch-overlay')
  const label   = document.getElementById('model-switch-label')
  const bar     = document.getElementById('model-switch-bar-fill')
  bar.style.width = '0%'
  overlay.classList.add('visible')
  label.textContent = `Loading ${def.name}...`
  bar.style.width = '20%'

  // Apply new model settings to CONFIG; reset demoMode so a prior failure doesn't persist
  CONFIG.demoMode = false
  Object.assign(CONFIG, def)
  currentModelKey = key

  // Resize preprocessing resources to match the new model's inputSize
  offscreen.width  = CONFIG.inputSize
  offscreen.height = CONFIG.inputSize
  preprocessBuf = new Float32Array(3 * CONFIG.inputSize * CONFIG.inputSize)

  // Wait for any in-flight inference to finish before releasing WASM sessions
  while (loopRunning) await new Promise(r => setTimeout(r, 16))

  // Release old sessions to free WASM memory before allocating new ones
  if (session)    { try { await session.release()    } catch (_) {} }
  if (camSession) { try { await camSession.release() } catch (_) {} }
  session = null
  camSession = null

  // Reset Grad-CAM toggle — new model needs its own cam session loaded on demand
  showGradcam = false
  document.getElementById('btn-gradcam').classList.remove('active', 'cam-shake')
  gradcamCanvas.classList.remove('visible')
  gradcamCtx.clearRect(0, 0, gradcamCanvas.width, gradcamCanvas.height)

  try {
    bar.style.width = '40%'
    const sess = await ort.InferenceSession.create(CONFIG.modelUrl, {
      executionProviders: ['wasm'],
      externalData: [{ path: CONFIG.modelDataFile, data: CONFIG.modelDataUrl }],
    })
    bar.style.width = '75%'
    // warm-up
    const dummy = new ort.Tensor('float32',
      new Float32Array(1 * 3 * CONFIG.inputSize * CONFIG.inputSize),
      [1, 3, CONFIG.inputSize, CONFIG.inputSize])
    await sess.run({ input: dummy })
    session = sess
    bar.style.width = '100%'
  } catch (e) {
    console.error('model switch failed:', e)
    label.textContent = 'Load failed — demo mode'
    CONFIG.demoMode = true
  }

  // Rebuild bars for (possibly new) labels
  initBars()
  updateModelBadge()

  // Update picker active state
  document.querySelectorAll('.model-opt').forEach(el => {
    el.classList.toggle('active', el.id === `model-opt-${key}`)
  })

  await new Promise(r => setTimeout(r, 250))
  bar.style.width = '0%'
  overlay.classList.remove('visible')

  if (wasRunning) {
    isRunning = true
    requestAnimationFrame(inferenceLoop)
  }
}

// ─────────────────────────────────────────────────────────────
//  Image upload test
// ─────────────────────────────────────────────────────────────
async function testImage(input) {
  const file = input.files[0]
  if (!file) return
  input.value = ''

  const overlay = document.getElementById('test-overlay')
  const imgEl   = document.getElementById('test-img')
  const resultEl = document.getElementById('test-result')
  const barsEl  = document.getElementById('test-bars')

  // Pause live inference while the test overlay is open
  if (!isPaused) {
    _testPaused = true
    isPaused = true
    document.getElementById('scan-line').style.animationPlayState = 'paused'
  }

  if (testObjectURL) { URL.revokeObjectURL(testObjectURL) }
  testObjectURL = URL.createObjectURL(file)
  imgEl.src = testObjectURL          // display uses browser auto-rotation (correct for user)
  overlay.style.display = 'flex'
  resultEl.textContent = 'Running inference...'
  barsEl.innerHTML = ''

  await new Promise(r => { imgEl.onload = r })

  // Use createImageBitmap with imageOrientation:'none' so inference sees raw JPEG bytes —
  // the same pixel layout PIL.Image.open() returns (no EXIF auto-rotation).
  // Browser <img> applies EXIF rotation for display, but that would feed the model
  // differently than Colab/training, causing wrong-class predictions on phone photos.
  let source
  try {
    source = await createImageBitmap(file, { imageOrientation: 'none' })
  } catch (_) {
    // Fallback for browsers that don't support imageOrientation option
    source = imgEl
  }

  const size = CONFIG.inputSize
  const iw = source.naturalWidth  || source.width   // naturalWidth for <img>, width for ImageBitmap
  const ih = source.naturalHeight || source.height
  const scale = Math.max(size / iw, size / ih)
  const sw = Math.round(iw * scale)
  const sh = Math.round(ih * scale)
  const sx = Math.floor((sw - size) / 2)
  const sy = Math.floor((sh - size) / 2)

  // Two-step: resize → center-crop (matches PIL Resize+CenterCrop)
  // Explicit sRGB color space to avoid Display P3 pixel drift on iOS Safari
  const resized = document.createElement('canvas')
  resized.width = sw; resized.height = sh
  resized.getContext('2d', { colorSpace: 'srgb' }).drawImage(source, 0, 0, sw, sh)

  const crop = document.createElement('canvas')
  crop.width = size; crop.height = size
  const cropCtx = crop.getContext('2d', { colorSpace: 'srgb', willReadFrequently: true })
  cropCtx.drawImage(resized, sx, sy, size, size, 0, 0, size, size)

  const { data } = cropCtx.getImageData(0, 0, size, size)
  const n = size * size
  const float32 = new Float32Array(3 * n)
  const [mr, mg, mb] = CONFIG.mean
  const [sr, sg, sb] = CONFIG.std
  for (let i = 0; i < n; i++) {
    float32[i]         = (data[i * 4]     / 255 - mr) / sr
    float32[i + n]     = (data[i * 4 + 1] / 255 - mg) / sg
    float32[i + n * 2] = (data[i * 4 + 2] / 255 - mb) / sb
  }
  const tensor = new ort.Tensor('float32', float32, [1, 3, size, size])

  // Use the regular session — CAM overlay is meaningless here (no canvas in the test view)
  let probs
  try {
    probs = await runInference(tensor)
  } catch (e) {
    resultEl.textContent = 'Inference failed: ' + e.message
    console.error('[testImage] error:', e)
    return
  }

  const topIdx   = probs.indexOf(Math.max(...probs))
  const conf     = probs[topIdx]   // MSP
  const rejected = conf < CONFIG.mspThreshold
  const isNormal = topIdx === CONFIG.normalClassIndex
  const isSevere = CONFIG.severeClasses.includes(topIdx)
  const color = rejected ? 'var(--muted)' :
    isNormal ? 'var(--green)' : isSevere ? 'var(--red)' : 'var(--amber)'
  const displayLabel = rejected ? 'out of scope' : CONFIG.labels[topIdx]

  resultEl.innerHTML = `
    <span style="color:${color}">${displayLabel}</span>
    <span style="font-size:14px;color:${color};margin-left:8px">${Math.round(conf*100)}%</span>
    ${rejected ? `<div style="font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:.06em;font-family:var(--mono)">MSP ${Math.round(conf*100)}% &lt; threshold ${Math.round(CONFIG.mspThreshold*100)}%</div>` : ''}
  `

  const sorted = probs
    .map((p, i) => ({ p, i }))
    .sort((a, b) => b.p - a.p)

  barsEl.innerHTML = sorted.map(({ p, i }) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:.07em;color:var(--muted);width:56px;flex-shrink:0;text-transform:uppercase">${CONFIG.labels[i]}</div>
      <div style="flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${Math.round(p*100)}%;background:${i===topIdx?color:'var(--border-hi)'};border-radius:2px"></div>
      </div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--muted);width:30px;text-align:right">${Math.round(p*100)}%</div>
    </div>
  `).join('')
}

function closeTest() {
  document.getElementById('test-overlay').style.display = 'none'
  if (testObjectURL) { URL.revokeObjectURL(testObjectURL); testObjectURL = null }
  if (_testPaused) {
    _testPaused = false
    isPaused = false
    document.getElementById('scan-line').style.animationPlayState = 'running'
    smoothedProbs = null
    requestAnimationFrame(inferenceLoop)
  }
}

// ─────────────────────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────────────────────
async function boot() {
  initBars()
  initModelPicker()
  updateModelBadge()
  document.getElementById('version-tag').textContent = CONFIG.version
  setLoadingStatus('Requesting camera...', 10)

  try {
    await startCamera()
  } catch (e) {
    setLoadingStatus('Camera access denied: ' + e.message, 100)
    return
  }

  setLoadingStatus('Loading AI model...', 40)
  session = await loadModel()
  setLoadingStatus('Ready', 100)

  await new Promise(r => setTimeout(r, 300))
  hideLoading()

  isRunning = true
  requestAnimationFrame(inferenceLoop)
}

boot().catch(e => {
  console.error(e)
  setLoadingStatus('Boot failed: ' + e.message, 100)
})
</script>
